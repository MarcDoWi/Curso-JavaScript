<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Tutorial 6</title>
        <script>
            function escribe_nombre(nombre) {
                document.write(nombre);
            }

            let nombre = prompt("Escribe tu nombre:");
        </script>
    </head>
    <body>
        <p style="font-size: 24px; font-weight: bold;">Hola: <script>escribe_nombre(nombre)</script>. Bienvenido a mi página web</p>
        <p>Esta es una web que trata de explicar temas de JavaScript, así que <script>escribe_nombre(nombre)</script> puedes plantear las dudas que desees.</p>
    </body>
</html>
