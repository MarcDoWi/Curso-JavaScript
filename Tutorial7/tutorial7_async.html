<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Tutorial 7 - Async</title>
        <script>
            let array = [1, 2, 3];

            // Para yo entenderlo, resolve es una función que te crea automáticamente JS y que avisa al hilo principal de que la promesa ya ha finalizado.
            const esperar = ms => new Promise(resolve => setTimeout(resolve, ms));

            async function addToArray(data, array) {
                await setTimeout(2000);
                if (!array) {
                    throw new Error("No existe el array");
                }
                array.push(data);
                alert(array);
                return array;
            }

            addToArray(4, array)
                .catch(err => alert("Error al intentar insertar la data al array"));
            alert("Esto debería salir antes que el array");
        </script>
    </head>
</html>
