<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Tutorial 7</title>
        <script>
            function addToArray(data, array, callback) {
                if (!array) {
                    callback(new Error("No existe el array"), null);
                } else {
                    array.push(data);
                    callback(null, array);  
                }
            }

            let array = [1, 2, 3];
            addToArray(4, array, function (err, array) {
                console.log(array);
                alert(array);
            })
        </script>
    </head>

</html>
